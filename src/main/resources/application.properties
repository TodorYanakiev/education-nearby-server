spring.application.name=education-nearby-server
logging.file.path=logs
spring.devtools.restart.enabled=${DEVTOOLS_RESTART_ENABLED:false}
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=${SERVER_PORT}

secret.key=${SECRET_KEY}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION}
jwt.oauth2-registration.expiration=${JWT_OAUTH2_REGISTRATION_EXPIRATION:600000}

app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:}
app.oauth2.error-redirect-uri=${OAUTH2_ERROR_REDIRECT_URI:}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.flyway.enabled=true
spring.flyway.repair=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=false

app.s3.bucket-name=${S3_BUCKET_NAME:}
app.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
app.s3.region=${S3_REGION:${AWS_REGION:eu-central-1}}
app.s3.allowed-prefix=${S3_ALLOWED_PREFIX:courses/}
app.s3.lyceum-allowed-prefix=${S3_LYCEUM_ALLOWED_PREFIX:lyceums/}
app.s3.user-allowed-prefix=${S3_USER_ALLOWED_PREFIX:users/}
app.exports.directory=${EXPORTS_DIRECTORY:exports}
app.exports.s3-prefix=${EXPORTS_S3_PREFIX:exports/subscribers/}
app.exports.presigned-url-minutes=${EXPORTS_PRESIGNED_URL_MINUTES:10}

sentry.dsn=${SENTRY_DSN:}
sentry.send-default-pii=true
sentry.logs.enabled=true
sentry.traces-sample-rate=1.0
sentry.profile-session-sample-rate=1.0
sentry.profile-lifecycle=TRACE
